<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Login - Hotel Booking</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(120deg,#1e293b,#0ea5e9);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.login-box{
background:white;
padding:40px;
width:350px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,.3);
text-align:center;
}

.login-box h2{
margin-bottom:25px;
color:#1e293b;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:8px;
outline:none;
}

input:focus{
border-color:#0ea5e9;
}

button{
width:100%;
padding:12px;
background:#0ea5e9;
border:none;
color:white;
font-size:16px;
border-radius:8px;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#0284c7;
}

.error{
color:red;
margin-bottom:10px;
}

</style>

</head>
<body>

<div class="login-box">

<h2>Admin Login</h2>

{% if messages %}
    {% for message in messages %}
        <p class="error">{{ message }}</p>
    {% endfor %}
{% endif %}

<form method="POST">
    {% csrf_token %}

    <input type="text" name="username" placeholder="Enter Username" required>

    <input type="password" name="password" placeholder="Enter Password" required>

    <button type="submit">Login</button>
</form>

</div>

</body>
</html>
