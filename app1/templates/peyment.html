<!DOCTYPE html>
<html>
<head>

<title>Hotel Payment</title>

<meta name="viewport" content="width=device-width, initial-scale=1">


<script src="https://checkout.razorpay.com/v1/checkout.js"></script>


<style>

body{
    font-family: Arial;
    background:#f5f5f5;
}


.payment-box{

    width:400px;
    margin:100px auto;
    background:white;
    padding:30px;
    text-align:center;
    border-radius:10px;
    box-shadow:0px 0px 15px #ccc;

}


button{

    background:#0d6efd;
    color:white;
    border:none;
    padding:12px 30px;
    border-radius:5px;
    font-size:18px;
    cursor:pointer;

}


</style>


</head>


<body>


<div class="payment-box">


<h2>
Hotel Booking Payment
</h2>


<h3>
Amount : ₹500
</h3>


<button id="pay-btn">
Pay Now
</button>


</div>




<script>


var options = {


    "key": "{{key}}",


    "amount": "{{payment.amount}}",


    "currency": "INR",


    "name": "Hotel Booking",


    "description": "Room Booking Payment",


    "order_id": "{{payment.id}}",



    "handler": function(response){


        alert(
        "Payment Successful"
        );


        console.log(response);


        /*
        response me milega:

        razorpay_payment_id
        razorpay_order_id
        razorpay_signature

        */


        window.location.href="/payment-success/";


    },



    "prefill": {

        "name": "Customer",

        "email": "customer@gmail.com",

        "contact": "9999999999"

    },



    "theme": {

        "color": "#0d6efd"

    }


};



var rzp = new Razorpay(options);



document.getElementById("pay-btn").onclick=function(e){


    rzp.open();


    e.preventDefault();


}



</script>



</body>
</html>
